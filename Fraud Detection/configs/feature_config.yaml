# ============================================================
# configs/feature_config.yaml
# ============================================================
# Complete feature catalogue for the fraud detection system.
# Defines: raw features, engineered features, GNN features,
#          feature store mappings, and data quality rules.
# ============================================================

# ──────────────────────────────────────────────────────────────
# Raw Features (ULB Dataset)
# ──────────────────────────────────────────────────────────────
raw_features:

  pca_components:
    description: >
      28 PCA-transformed features from original transaction data.
      Original features anonymised by dataset authors for privacy.
      V1 and V14 are strongest fraud predictors in the ULB dataset.
    features:
      - name: V1
        dtype: float32
        range: [-56.41, 2.45]
        fraud_predictive_rank: 2
        note: "Strong fraud signal — highly negative in fraud cases"
      - name: V2
        dtype: float32
        range: [-72.72, 22.06]
        fraud_predictive_rank: 8
      - name: V3
        dtype: float32
        range: [-48.33, 9.38]
        fraud_predictive_rank: 5
      - name: V4
        dtype: float32
        range: [-5.68, 16.88]
        fraud_predictive_rank: 7
      - name: V5
        dtype: float32
        range: [-113.74, 34.80]
        fraud_predictive_rank: 12
      - name: V6
        dtype: float32
        range: [-26.16, 73.30]
        fraud_predictive_rank: 15
      - name: V7
        dtype: float32
        range: [-43.56, 120.59]
        fraud_predictive_rank: 6
      - name: V8
        dtype: float32
        range: [-73.22, 20.01]
        fraud_predictive_rank: 18
      - name: V9
        dtype: float32
        range: [-13.43, 15.59]
        fraud_predictive_rank: 16
      - name: V10
        dtype: float32
        range: [-24.59, 23.75]
        fraud_predictive_rank: 4
      - name: V11
        dtype: float32
        range: [-4.80, 12.02]
        fraud_predictive_rank: 11
      - name: V12
        dtype: float32
        range: [-18.68, 7.85]
        fraud_predictive_rank: 3
      - name: V13
        dtype: float32
        range: [-5.79, 7.13]
        fraud_predictive_rank: 22
      - name: V14
        dtype: float32
        range: [-19.21, 10.53]
        fraud_predictive_rank: 1      # MOST predictive — very negative in fraud
        note: "Top fraud indicator in ULB dataset"
      - name: V15
        dtype: float32
        range: [-4.50, 8.88]
        fraud_predictive_rank: 24
      - name: V16
        dtype: float32
        range: [-14.13, 17.32]
        fraud_predictive_rank: 13
      - name: V17
        dtype: float32
        range: [-25.16, 9.25]
        fraud_predictive_rank: 9
        note: "Strong fraud signal alongside V14"
      - name: V18
        dtype: float32
        range: [-9.50, 5.04]
        fraud_predictive_rank: 17
      - name: V19
        dtype: float32
        range: [-7.21, 5.59]
        fraud_predictive_rank: 20
      - name: V20
        dtype: float32
        range: [-54.50, 39.42]
        fraud_predictive_rank: 21
      - name: V21
        dtype: float32
        range: [-34.83, 27.20]
        fraud_predictive_rank: 10
      - name: V22
        dtype: float32
        range: [-10.93, 10.50]
        fraud_predictive_rank: 23
      - name: V23
        dtype: float32
        range: [-44.81, 22.53]
        fraud_predictive_rank: 26
      - name: V24
        dtype: float32
        range: [-2.84, 4.58]
        fraud_predictive_rank: 28
      - name: V25
        dtype: float32
        range: [-10.30, 7.52]
